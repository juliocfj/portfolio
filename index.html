<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Julio Cesar de Faria Junior - IT Operations Specialist, Technical Support Engineer, Cloud & Systems Support portfolio."
    />
    <title>Julio Cesar de Faria Junior | Technical Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="header-shell">
        <a class="brand" href="#top" aria-label="Julio Junior home">
          <span class="brand-mark" aria-hidden="true">JJR</span>
          <span>Julio Junior</span>
        </a>

        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="headerNav">
          <span aria-hidden="true"></span>
          <span class="sr-only">Open navigation</span>
        </button>

        <nav id="headerNav" class="header-nav" aria-label="Main navigation">
          <div class="nav-links" id="navLinks"></div>
          <div class="header-actions">
            <div class="language-switcher" aria-label="Language selection">
              <button class="lang-btn" type="button" data-lang="en" aria-label="English">
                <img src="assets/eng.png" alt="" aria-hidden="true" />
              </button>
              <button class="lang-btn" type="button" data-lang="pt" aria-label="Português">
                <img src="assets/br.png" alt="" aria-hidden="true" />
              </button>
              <button class="lang-btn" type="button" data-lang="it" aria-label="Italiano">
                <img src="assets/ita.png" alt="" aria-hidden="true" />
              </button>
            </div>
            <a class="button ghost small" id="headerContact" target="_blank" rel="noopener noreferrer"></a>
            <a class="button primary small" id="headerCv" href="Julio_Cesar_CV.pdf" download></a>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="hero" id="top" aria-labelledby="heroTitle">
        <div class="hero-grid">
          <div class="hero-content">
            <p class="eyebrow" id="heroEyebrow"></p>
            <h1 id="heroTitle"></h1>
            <p class="subtitle" id="heroSubtitle"></p>
            <p class="hero-description" id="heroDescription"></p>
            <div class="badge-row" id="heroBadges"></div>
            <div class="hero-actions" id="heroActions"></div>
          </div>

          <aside class="signal-panel" aria-label="Professional highlights">
            <div class="orbital-ring" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="metric">
              <strong>7+</strong>
              <span id="metricExperience"></span>
            </div>
            <div class="metric">
              <strong>1,000+</strong>
              <span id="metricUsers"></span>
            </div>
            <div class="metric">
              <strong>3</strong>
              <span id="metricClouds"></span>
            </div>
          </aside>
        </div>
      </section>

      <section class="section-picker" aria-labelledby="sectionsTitle">
        <div class="section-heading">
          <p class="eyebrow" id="sectionsEyebrow"></p>
          <h2 id="sectionsTitle"></h2>
        </div>
        <div class="section-grid" id="sectionGrid"></div>
      </section>

      <section class="active-section" aria-live="polite">
        <div class="active-shell" id="activeSection"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footerText"></p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
